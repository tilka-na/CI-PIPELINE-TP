on:
    push:
        branches:
            -main
    pull_request:
        branches:
            -main
jobs:              
    build:
        runs-on: ubuntu-latest
        steps:
            - name: recuperer le code
              uses: actions/checkout@v4
            - name: installer python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'
            - name: installer les dependances
              run: pip install -r requirements.txt
            - name: lancer les tests
              run: pytest tests/ -v --cov=app 
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: lancer flake8
              run: | 
                flake8 app --count --select=E9,F63,F7,F82,F841 --show-source --statistics
                flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
                flake8 tests --count --max-line-length=127 --statistics

